# ============================================================
# Framework configuration
# Edit these values to point the framework at your own app.
# ============================================================

# Which browser Playwright should launch: chromium | firefox | webkit
browser=chromium

# Run without opening a visible window (true = headless, good for CI)
# Set to false to watch the browser open while learning.
headless=false

# Slows down every Playwright action by this many milliseconds so you can
# watch what the test is doing. NOTE: in this Playwright version a non-zero
# value can make actions time out, so keep it at 0 for reliable runs and
# watch the browser by setting headless=false instead.
slowMo=0

# Base URL of the web application under test (UI tests)
# Using a free, real demo site (the-internet) so the login example works.
base.url=https://the-internet.herokuapp.com

# Base URL of the API under test (API tests)
# Using a free, no-auth demo API so the example passes out of the box.
api.base.uri=https://jsonplaceholder.typicode.com

# URL used by the Wikipedia "search" example scenario
ui.search.url=https://en.wikipedia.org
